    <style>
        /* CSS เฉพาะสำหรับหน้านี้ */
        .contact-section {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
            text-align: center;
        }

        .contact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 25px;
            margin-top: 40px;
        }

        .contact-card {
            border: 2px solid #000;
            padding: 30px 20px;
            text-decoration: none;
            color: #000;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            /* เพิ่มมุมโค้งให้เข้ากับธีมเว็บ */
            border-radius: 20px; 
        }

        /* Hover Effect */
        .contact-card:hover {
            background-color: #223a0f; /* เปลี่ยนเป็นสีเขียวเข้มตามธีมเว็บ */
            border-color: #223a0f;
            color: #fff;
            transform: translateY(-10px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .contact-card i {
            font-size: 45px;
        }

        .contact-card span {
            font-weight: bold;
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .contact-card p {
            margin: 0;
            font-size: 15px;
        }
    </style>
</head>
